services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bug-management-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    restart: always
    networks:
      - bug-management-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bug-management-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - bug-management-network

networks:
  bug-management-network:
    driver: bridge

volumes:
  backend_media: